<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNS広告トレンド</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0A0A0A;
      --paper: #F5F0E8;
      --muted: #3A3530;
      --ghost: #141210;
      --accent: #E8401A;
      --rule: rgba(245, 240, 232, 0.07);
    }

    [x-cloak] { display: none !important; }
    * { box-sizing: border-box; }

    body {
      background-color: var(--ink);
      color: var(--paper);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
    }

    /* Grain texture overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    .font-display { font-family: 'Playfair Display', serif; }

    /* Masthead */
    .masthead {
      border-bottom: 1px solid var(--rule);
      position: relative;
    }
    .masthead::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 120px;
      height: 1px;
      background: var(--accent);
    }

    /* Filter tabs */
    .filter-tab {
      color: rgba(245, 240, 232, 0.28);
      border-bottom: 1px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      padding-bottom: 3px;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      white-space: nowrap;
      background: none;
      cursor: pointer;
    }
    .filter-tab:hover { color: rgba(245, 240, 232, 0.65); }
    .filter-tab.active {
      color: var(--paper);
      border-bottom-color: var(--accent);
    }

    /* Cards with thumbnail */
    .trend-card {
      position: relative;
      overflow: hidden;
      background: var(--ghost);
      aspect-ratio: 4/5;
      display: block;
    }
    .trend-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      display: block;
    }
    .trend-card:hover img { transform: scale(1.08); }
    .trend-card .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(10,10,10,0.96) 0%,
        rgba(10,10,10,0.35) 50%,
        transparent 100%
      );
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .trend-card:hover .overlay { opacity: 1; }
    .trend-card .card-content {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 14px;
      transform: translateY(6px);
      opacity: 0;
      transition: transform 0.4s ease, opacity 0.4s ease;
    }
    .trend-card:hover .card-content { transform: translateY(0); opacity: 1; }
    .source-badge {
      position: absolute;
      top: 10px; left: 10px;
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: var(--accent);
      color: #fff;
      padding: 2px 7px;
      font-family: 'DM Mono', monospace;
    }

    /* No-image card */
    .no-image-card {
      background: var(--ghost);
      border: 1px solid var(--rule);
      aspect-ratio: 4/5;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 14px;
    }
    .no-image-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 18px,
        rgba(245,240,232,0.018) 18px,
        rgba(245,240,232,0.018) 19px
      );
    }
    .no-image-card:hover { border-color: rgba(245,240,232,0.18); }

    /* Buttons */
    .collect-btn {
      background: transparent;
      border: 1px solid rgba(245,240,232,0.18);
      color: var(--paper);
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 8px 18px;
      transition: background 0.2s, border-color 0.2s;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .collect-btn:hover:not(:disabled) {
      background: var(--accent);
      border-color: var(--accent);
    }
    .collect-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .load-more-btn {
      background: transparent;
      border: 1px solid rgba(245,240,232,0.12);
      color: rgba(245,240,232,0.4);
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 10px 36px;
      transition: all 0.2s;
      cursor: pointer;
    }
    .load-more-btn:hover:not(:disabled) {
      border-color: rgba(245,240,232,0.35);
      color: var(--paper);
    }
    .load-more-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Notification */
    .notif-bar {
      background: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-in { animation: fadeUp 0.5s ease both; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.75s linear infinite; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: var(--ink); }
    ::-webkit-scrollbar-thumb { background: var(--muted); }
  </style>
</head>
<body x-data="app()" x-init="init()" x-cloak>

  <!-- Notification bar -->
  <div
    x-show="notification"
    x-transition:enter="transition duration-300"
    x-transition:enter-start="opacity-0 -translate-y-full"
    x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition duration-200"
    x-transition:leave-end="opacity-0"
    class="notif-bar text-white text-center py-2 px-4"
    x-text="notification"
  ></div>

  <!-- Masthead -->
  <header class="masthead px-6 pt-8 pb-6">
    <div class="max-w-screen-2xl mx-auto">
      <div class="flex items-end justify-between gap-6 flex-wrap">
        <div>
          <p class="text-xs tracking-widest uppercase opacity-30 mb-2">Design Intelligence</p>
          <h1 class="font-display text-5xl md:text-6xl lg:text-7xl font-black leading-none tracking-tight">
            SNS<span style="color:var(--accent)">/</span>Trend
          </h1>
          <p class="text-xs opacity-25 mt-3 tracking-wider">
            自動収集 &middot; 6時間ごと更新 &middot; <span x-text="totalCount + ' 件'"></span>
          </p>
        </div>
        <button @click="refresh()" :disabled="refreshing" class="collect-btn">
          <svg :class="refreshing ? 'spin' : ''" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
          <span x-text="refreshing ? 'Collecting...' : 'Collect Now'"></span>
        </button>
      </div>

      <!-- Source filters -->
      <div class="mt-7 flex gap-7 overflow-x-auto pb-px">
        <button
          @click="selectSource(null)"
          :class="selectedSource === null ? 'active' : ''"
          class="filter-tab"
        >All <span class="opacity-40" x-text="'— ' + totalCount"></span></button>
        <template x-for="s in sources" :key="s.source">
          <button
            @click="selectSource(s.source)"
            :class="selectedSource === s.source ? 'active' : ''"
            class="filter-tab"
            x-text="s.source + ' — ' + s.count"
          ></button>
        </template>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="px-6 py-8 max-w-screen-2xl mx-auto">

    <!-- Loading -->
    <div x-show="loading" class="flex flex-col items-center justify-center py-36 gap-4 opacity-25">
      <svg class="spin w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      <span class="text-xs tracking-widest uppercase">Loading</span>
    </div>

    <!-- Empty -->
    <div x-show="!loading && posts.length === 0"
         class="flex flex-col items-center justify-center py-36 gap-4 opacity-20">
      <div class="font-display text-7xl font-black">∅</div>
      <p class="text-xs tracking-widest uppercase">No posts yet — collect to begin</p>
    </div>

    <!-- Card grid -->
    <div x-show="!loading"
         class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 2xl:grid-cols-7 gap-2.5">
      <template x-for="(post, i) in posts" :key="post.id">
        <a
          :href="post.link"
          target="_blank"
          rel="noopener noreferrer"
          class="card-in block"
          :style="'animation-delay:' + Math.min(i * 25, 500) + 'ms'"
        >
          <!-- With image -->
          <template x-if="post.thumbnail">
            <div class="trend-card">
              <img
                :src="post.thumbnail"
                :alt="post.title_ja || post.title"
                @error="post.thumbnail = null"
              />
              <div class="overlay"></div>
              <div class="source-badge" x-text="post.source"></div>
              <div class="card-content">
                <p class="font-display text-sm font-bold leading-snug text-white line-clamp-3"
                   x-text="post.title_ja || post.title"></p>
              </div>
            </div>
          </template>

          <!-- No image -->
          <template x-if="!post.thumbnail">
            <div class="no-image-card">
              <div class="text-xs tracking-widest uppercase relative" style="color:var(--accent)"
                   x-text="post.source"></div>
              <p class="font-display text-sm font-bold leading-snug line-clamp-4 relative"
                 x-text="post.title_ja || post.title"></p>
              <svg class="w-3.5 h-3.5 opacity-15 self-end relative" fill="none"
                   viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
              </svg>
            </div>
          </template>
        </a>
      </template>
    </div>

    <!-- Load more -->
    <div x-show="!loading && hasMore" class="flex justify-center mt-12">
      <button @click="loadMore()" :disabled="loadingMore" class="load-more-btn">
        <span x-text="loadingMore ? 'Loading...' : 'Load More'"></span>
      </button>
    </div>
  </main>

  <script>
    function app() {
      return {
        posts: [],
        sources: [],
        selectedSource: null,
        loading: true,
        loadingMore: false,
        refreshing: false,
        notification: '',
        offset: 0,
        limit: 50,
        hasMore: true,
        totalCount: 0,

        async init() {
          await Promise.all([this.loadSources(), this.loadPosts()]);
        },

        async loadSources() {
          const res = await fetch('/api/sources');
          this.sources = await res.json();
          this.totalCount = this.sources.reduce((sum, s) => sum + s.count, 0);
        },

        async loadPosts(reset = true) {
          if (reset) {
            this.loading = true;
            this.offset = 0;
            this.posts = [];
          }
          const params = new URLSearchParams({ limit: this.limit, offset: this.offset });
          if (this.selectedSource) params.set('source', this.selectedSource);
          const res = await fetch('/api/posts?' + params);
          const data = await res.json();
          this.posts = reset ? data : [...this.posts, ...data];
          this.hasMore = data.length === this.limit;
          this.loading = false;
        },

        async loadMore() {
          this.loadingMore = true;
          this.offset += this.limit;
          const params = new URLSearchParams({ limit: this.limit, offset: this.offset });
          if (this.selectedSource) params.set('source', this.selectedSource);
          const res = await fetch('/api/posts?' + params);
          const data = await res.json();
          this.posts = [...this.posts, ...data];
          this.hasMore = data.length === this.limit;
          this.loadingMore = false;
        },

        async selectSource(source) {
          this.selectedSource = source;
          await this.loadPosts();
        },

        async refresh() {
          this.refreshing = true;
          const res = await fetch('/api/refresh', { method: 'POST' });
          const data = await res.json();
          this.refreshing = false;
          this.notification = data.saved + ' 件の新しい投稿を収集しました';
          await Promise.all([this.loadSources(), this.loadPosts()]);
          setTimeout(() => this.notification = '', 4000);
        },
      };
    }
  </script>
</body>
</html>
