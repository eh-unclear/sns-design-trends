<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNS広告トレンド</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    [x-cloak] { display: none !important; }

    :root {
      --bg: #f2f3f5;
      --surface: #ffffff;
      --border: #e4e6ea;
      --text: #1a1a1a;
      --text-sub: #666;
      --text-muted: #999;
      --accent: #e84c1e;
      --accent-sub: #fff3f0;
      --tag-bg: #f0f0f0;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
    }

    /* Header */
    .site-header {
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 16px;
      display: flex;
      align-items: center;
      height: 52px;
      gap: 16px;
    }
    .site-logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      white-space: nowrap;
    }
    .site-logo span { color: var(--accent); }
    .header-meta {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .refresh-btn {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    .refresh-btn:hover { opacity: 0.88; }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .spin { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Tab bar */
    .tab-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .tab-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 16px;
      display: flex;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tab-inner::-webkit-scrollbar { display: none; }
    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 10px 16px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-sub);
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 700;
    }
    .tab-count {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-muted);
      margin-left: 3px;
    }

    /* Notification */
    .notif {
      background: #e8f5e9;
      color: #2e7d32;
      font-size: 12px;
      text-align: center;
      padding: 8px;
      border-bottom: 1px solid #c8e6c9;
    }

    /* Main layout */
    .main-wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 16px;
    }

    /* Card grid */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    @media (min-width: 640px)  { .card-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 900px)  { .card-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (min-width: 1100px) { .card-grid { grid-template-columns: repeat(5, 1fr); } }
    @media (min-width: 1280px) { .card-grid { grid-template-columns: repeat(6, 1fr); } }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      transform: translateY(-2px);
    }
    .card-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
      background: var(--bg);
    }
    .card-no-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, #f8f8f8 0%, #ececec 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-no-thumb svg { opacity: 0.2; }
    .card-body {
      padding: 10px 12px 12px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .card-source {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.02em;
    }
    .card-title {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.5;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Load more */
    .load-more-wrap { text-align: center; padding: 24px 0 8px; }
    .load-more-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 32px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-sub);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .load-more-btn:hover { background: var(--bg); border-color: #ccc; }
    .load-more-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Empty / loading */
    .state-msg {
      text-align: center;
      padding: 60px 0;
      color: var(--text-muted);
      font-size: 14px;
    }
  </style>
</head>
<body x-data="app()" x-init="init()" x-cloak>

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <div class="site-logo">SNS広告<span>トレンド</span></div>
      <div class="header-meta">6時間ごと自動更新 · <span x-text="totalCount + '件'"></span></div>
      <button class="refresh-btn" @click="refresh()" :disabled="refreshing">
        <svg :class="refreshing ? 'spin' : ''" width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        <span x-text="refreshing ? '収集中...' : '今すぐ収集'"></span>
      </button>
    </div>
  </header>

  <!-- Tab bar -->
  <div class="tab-bar">
    <div class="tab-inner">
      <button class="tab-btn" :class="selectedSource === null ? 'active' : ''" @click="selectSource(null)">
        すべて<span class="tab-count" x-text="totalCount"></span>
      </button>
      <template x-for="s in sources" :key="s.source">
        <button class="tab-btn" :class="selectedSource === s.source ? 'active' : ''" @click="selectSource(s.source)">
          <span x-text="s.source"></span><span class="tab-count" x-text="s.count"></span>
        </button>
      </template>
    </div>
  </div>

  <!-- Notification -->
  <div class="notif" x-show="notification" x-text="notification"></div>

  <!-- Main -->
  <div class="main-wrap">

    <div class="state-msg" x-show="loading">読み込み中...</div>
    <div class="state-msg" x-show="!loading && posts.length === 0">
      投稿がありません。「今すぐ収集」を押してください。
    </div>

    <div class="card-grid" x-show="!loading">
      <template x-for="post in posts" :key="post.id">
        <a class="card" :href="post.link" target="_blank" rel="noopener noreferrer">
          <template x-if="post.thumbnail">
            <img class="card-thumb" :src="post.thumbnail" :alt="post.title_ja || post.title"
                 @error="post.thumbnail = null" loading="lazy">
          </template>
          <template x-if="!post.thumbnail">
            <div class="card-no-thumb">
              <svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
              </svg>
            </div>
          </template>
          <div class="card-body">
            <div class="card-source" x-text="post.source"></div>
            <div class="card-title" x-text="post.title_ja || post.title"></div>
          </div>
        </a>
      </template>
    </div>

    <div class="load-more-wrap" x-show="!loading && hasMore">
      <button class="load-more-btn" @click="loadMore()" :disabled="loadingMore">
        <span x-text="loadingMore ? '読み込み中...' : 'もっと見る'"></span>
      </button>
    </div>
  </div>

  <script>
    function app() {
      return {
        posts: [], sources: [], selectedSource: null,
        loading: true, loadingMore: false, refreshing: false,
        notification: '', offset: 0, limit: 50, hasMore: true, totalCount: 0,

        async init() {
          await Promise.all([this.loadSources(), this.loadPosts()]);
        },
        async loadSources() {
          const res = await fetch('/api/sources');
          this.sources = await res.json();
          this.totalCount = this.sources.reduce((s, x) => s + x.count, 0);
        },
        async loadPosts(reset = true) {
          if (reset) { this.loading = true; this.offset = 0; this.posts = []; }
          const p = new URLSearchParams({ limit: this.limit, offset: this.offset });
          if (this.selectedSource) p.set('source', this.selectedSource);
          const data = await fetch('/api/posts?' + p).then(r => r.json());
          this.posts = reset ? data : [...this.posts, ...data];
          this.hasMore = data.length === this.limit;
          this.loading = false;
        },
        async loadMore() {
          this.loadingMore = true;
          this.offset += this.limit;
          const p = new URLSearchParams({ limit: this.limit, offset: this.offset });
          if (this.selectedSource) p.set('source', this.selectedSource);
          const data = await fetch('/api/posts?' + p).then(r => r.json());
          this.posts = [...this.posts, ...data];
          this.hasMore = data.length === this.limit;
          this.loadingMore = false;
        },
        async selectSource(source) {
          this.selectedSource = source;
          await this.loadPosts();
        },
        async refresh() {
          this.refreshing = true;
          const data = await fetch('/api/refresh', { method: 'POST' }).then(r => r.json());
          this.refreshing = false;
          this.notification = data.saved + ' 件の新しい投稿を収集しました';
          await Promise.all([this.loadSources(), this.loadPosts()]);
          setTimeout(() => this.notification = '', 4000);
        },
      };
    }
  </script>
</body>
</html>
