    <button
      @click="refresh()"

      class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white text-sm font-medium px-4 py-2 rounded-lg transition"

      <svg :class="refreshing ? 'animate-spin' : ''" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">

      </svg>

  <!-- フィルター -->
  <div class="px-6 py-4 flex gap-2 flex-wrap border-b border-gray-800 bg-gray-900">
    <button

      :class="selectedSource === null ? 'bg-indigo-600 text-white' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'"
      class="px-3 py-1.5 rounded-full text-sm font-medium transition"
    >
      すべて <span class="text-xs opacity-70" x-text="'(' + totalCount + ')'"></span>
    </button>
    <template x-for="s in sources" :key="s.source">
      <button
        @click="selectSource(s.source)"
        :class="selectedSource === s.source ? 'bg-indigo-600 text-white' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'"
        class="px-3 py-1.5 rounded-full text-sm font-medium transition"
        x-text="s.source + ' (' + s.count + ')'"
      ></button>
    </template>
  </div>

  <!-- 通知バナー -->
  <div x-show="notification" x-transition class="bg-green-800 text-green-100 text-sm text-center py-2" x-text="notification"></div>

  <!-- カードグリッド -->
  <main class="px-6 py-6">
    <div x-show="loading" class="flex justify-center py-20">
      <svg class="animate-spin w-8 h-8 text-indigo-400" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>

    <div x-show="!loading && posts.length === 0" class="text-center text-gray-500 py-20">

            </svg>
          </div>

    <!-- もっと見る -->
    <div x-show="!loading && hasMore" class="flex justify-center mt-8">
      <button
        @click="loadMore()"
        :disabled="loadingMore"
        class="bg-gray-800 hover:bg-gray-700 disabled:opacity-50 text-gray-300 px-6 py-2 rounded-lg text-sm transition"
      >
        <span x-text="loadingMore ? '読み込み中...' : 'もっと見る'"></span>
      </button>
    </div>
  </main>

  <script>
    function app() {
      return {
        posts: [],
        sources: [],
        selectedSource: null,
        loading: true,
        loadingMore: false,
        refreshing: false,
        notification: '',
        offset: 0,
        limit: 50,
        hasMore: true,
        totalCount: 0,

        async init() {
          await Promise.all([this.loadSources(), this.loadPosts()]);
        },

        async loadSources() {
          const res = await fetch('/api/sources');
          this.sources = await res.json();
          this.totalCount = this.sources.reduce((sum, s) => sum + s.count, 0);
        },

        async loadPosts(reset = true) {
          if (reset) {
            this.loading = true;
            this.offset = 0;
            this.posts = [];
          }
          const params = new URLSearchParams({ limit: this.limit, offset: this.offset });
          if (this.selectedSource) params.set('source', this.selectedSource);
          const res = await fetch('/api/posts?' + params);
          const data = await res.json();
          this.posts = reset ? data : [...this.posts, ...data];
          this.hasMore = data.length === this.limit;
          this.loading = false;
        },

        async loadMore() {
          this.loadingMore = true;
          this.offset += this.limit;
          const params = new URLSearchParams({ limit: this.limit, offset: this.offset });
          if (this.selectedSource) params.set('source', this.selectedSource);
          const res = await fetch('/api/posts?' + params);
          const data = await res.json();
          this.posts = [...this.posts, ...data];
          this.hasMore = data.length === this.limit;
          this.loadingMore = false;
        },

        async selectSource(source) {
          this.selectedSource = source;
          await this.loadPosts();
        },

        async refresh() {
          this.refreshing = true;
          const res = await fetch('/api/refresh', { method: 'POST' });
          const data = await res.json();
          this.refreshing = false;
          this.notification = `${data.saved} 件の新しい投稿を収集しました`;
          await Promise.all([this.loadSources(), this.loadPosts()]);
          setTimeout(() => this.notification = '', 4000);
        },
      };
    }
  </script>
